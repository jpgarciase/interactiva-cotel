<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Cotel Interactiva</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #58585A; 
            color: white;
        }
        .admin-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #FFED00;
        }
        h1 { color: #FFED00; margin-bottom: 30px; }
        .btn-danger {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3);
            transition: all 0.3s ease;
        }
        .btn-danger:hover { background-color: #ff1a1a; transform: scale(1.05); }
        .btn-danger:active { transform: scale(0.95); }
        p { margin-top: 20px; font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h1>PANEL DE CONTROL</h1>
        <button class="btn-danger" onclick="limpiarNube()">Reiniciar Nube de Palabras</button>
        <p>Al presionar este botón, se borrarán todas las respuestas actuales en tiempo real.</p>
    </div>

    <script>
        // PEGA TUS DATOS DE FIREBASE AQUÍ
        const firebaseConfig = {
            apiKey: "AIzaSyCSma3iR_QDuZzmotbchFMzLtvHfe1l--U",
            authDomain: "interactiva-cotel.firebaseapp.com",
            projectId: "interactiva-cotel",
            storageBucket: "interactiva-cotel.firebasestorage.app",
            messagingSenderId: "33652295311",
            appId: "1:33652295311:web:a079754cd45c5e430d12fa",
            databaseURL: "https://interactiva-cotel-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function limpiarNube() {
            if(confirm("¿Estás seguro de que quieres borrar todas las palabras?")) {
                db.ref('nube').remove()
                .then(() => alert("Nube limpiada con éxito"))
                .catch((error) => alert("Error al limpiar: " + error.message));
            }
        }
    </script>
</body>
</html>
